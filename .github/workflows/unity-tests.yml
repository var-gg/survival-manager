name: unity-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  editmode-tests:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Unity license file
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::error::UNITY_LICENSE secret is required for Unity EditMode tests."
            exit 1
          fi
          mkdir -p /root/.local/share/unity3d/Unity
          printf '%s' "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
          chmod 600 /root/.local/share/unity3d/Unity/Unity_lic.ulf

      - name: Run EditMode scene integrity + domain tests (Unity 6000.4.0f1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform EditMode \
            -testResults test-results/editmode/results.xml \
            -logFile test-results/editmode/unity.log

      - name: Upload EditMode results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: test-results/editmode

  playmode-smoke:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Unity license file
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::error::UNITY_LICENSE secret is required for Unity PlayMode tests."
            exit 1
          fi
          mkdir -p /root/.local/share/unity3d/Unity
          printf '%s' "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
          chmod 600 /root/.local/share/unity3d/Unity/Unity_lic.ulf

      - name: Run PlayMode bootstrap + loop smoke tests (Unity 6000.4.0f1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/playmode
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform PlayMode \
            -testResults test-results/playmode/results.xml \
            -logFile test-results/playmode/unity.log

      - name: Upload PlayMode results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-playmode-results
          path: test-results/playmode

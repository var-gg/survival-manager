name: unity-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  editmode-tests:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Activate Unity license
        id: unity-license
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::notice::UNITY_LICENSE secret is not configured; skipping Unity EditMode tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          license_file="$RUNNER_TEMP/unity-license.ulf"
          printf '%s' "$UNITY_LICENSE" > "$license_file"
          chmod 600 "$license_file"
          if /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -quit \
            -manualLicenseFile "$license_file" \
            -logFile test-results/editmode/unity-license-activation.log; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Unity license activation failed; skipping Unity EditMode tests. Check unity-license-activation.log artifact."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run EditMode scene integrity + domain tests (Unity 6000.4.0f1)
        if: steps.unity-license.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform EditMode \
            -testResults test-results/editmode/results.xml \
            -logFile test-results/editmode/unity.log

      - name: Upload EditMode results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-editmode-results
          path: test-results/editmode

  playmode-smoke:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Activate Unity license
        id: unity-license
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/playmode
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::notice::UNITY_LICENSE secret is not configured; skipping Unity PlayMode tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          license_file="$RUNNER_TEMP/unity-license.ulf"
          printf '%s' "$UNITY_LICENSE" > "$license_file"
          chmod 600 "$license_file"
          if /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -quit \
            -manualLicenseFile "$license_file" \
            -logFile test-results/playmode/unity-license-activation.log; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Unity license activation failed; skipping Unity PlayMode tests. Check unity-license-activation.log artifact."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PlayMode bootstrap + loop smoke tests (Unity 6000.4.0f1)
        if: steps.unity-license.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/playmode
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform PlayMode \
            -testResults test-results/playmode/results.xml \
            -logFile test-results/playmode/unity.log

      - name: Upload PlayMode results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-playmode-results
          path: test-results/playmode

name: unity-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  editmode-tests:
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Run EditMode scene integrity + domain tests (Unity 6000.4.0f1)
        uses: game-ci/unity-test-runner@v4
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          unityVersion: 6000.4.0f1
          testMode: editmode
          projectPath: .
          checkName: EditMode Scene Integrity Tests
          artifactsPath: test-results/editmode

      - name: Upload EditMode results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: test-results/editmode

  playmode-smoke:
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Run PlayMode bootstrap + loop smoke tests (Unity 6000.4.0f1)
        uses: game-ci/unity-test-runner@v4
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          unityVersion: 6000.4.0f1
          testMode: playmode
          projectPath: .
          checkName: PlayMode First Playable Smoke Tests
          artifactsPath: test-results/playmode

      - name: Upload PlayMode results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-playmode-results
          path: test-results/playmode

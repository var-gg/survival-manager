name: docs-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run docs policy check
        shell: pwsh
        run: pwsh -File tools/docs-policy-check.ps1 -RepoRoot .

      - name: Run smoke check
        shell: pwsh
        run: pwsh -File tools/smoke-check.ps1 -RepoRoot .

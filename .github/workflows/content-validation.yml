name: content-validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  content-validation:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Activate Unity license
        id: unity-license
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Logs
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::warning::UNITY_LICENSE secret is not configured; skipping Unity batch validation."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          license_file="$RUNNER_TEMP/unity-license.ulf"
          printf '%s' "$UNITY_LICENSE" > "$license_file"
          chmod 600 "$license_file"
          if /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -quit \
            -manualLicenseFile "$license_file" \
            -logFile Logs/unity-license-activation.log; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Unity license activation failed; skipping Unity batch validation. Check Logs/unity-license-activation.log artifact."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run content validation batch
        if: steps.unity-license.outputs.available == 'true'
        run: >
          /opt/unity/Editor/Unity
          -batchmode
          -nographics
          -projectPath .
          -quit
          -logFile Logs/content-validation-ci.log
          -executeMethod SM.Editor.Validation.ValidationBatchEntryPoint.RunContentValidation

      - name: Run balance sweep smoke batch
        if: steps.unity-license.outputs.available == 'true'
        run: >
          /opt/unity/Editor/Unity
          -batchmode
          -nographics
          -projectPath .
          -quit
          -logFile Logs/balance-sweep-ci.log
          -executeMethod SM.Editor.Validation.ValidationBatchEntryPoint.RunBalanceSweepSmoke

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: content-validation-artifacts
          path: |
            Logs/content-validation/**
            Logs/balance-sweep/**
            Logs/unity-license-activation.log
            Logs/content-validation-ci.log
            Logs/balance-sweep-ci.log

  editmode-validation-tests:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Activate Unity license
        id: unity-license
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode-validation
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::warning::UNITY_LICENSE secret is not configured; skipping Unity EditMode validation."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          license_file="$RUNNER_TEMP/unity-license.ulf"
          printf '%s' "$UNITY_LICENSE" > "$license_file"
          chmod 600 "$license_file"
          if /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -quit \
            -manualLicenseFile "$license_file" \
            -logFile test-results/editmode-validation/unity-license-activation.log; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Unity license activation failed; skipping Unity EditMode validation. Check unity-license-activation.log artifact."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run EditMode validation and compile tests (Unity 6000.4.0f1)
        if: steps.unity-license.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode-validation
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform EditMode \
            -testResults test-results/editmode-validation/results.xml \
            -logFile test-results/editmode-validation/unity.log

      - name: Upload EditMode validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-editmode-validation-results
          path: test-results/editmode-validation

name: content-validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  content-validation:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Unity license file
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::error::UNITY_LICENSE secret is required for Unity batch validation."
            exit 1
          fi
          mkdir -p /root/.local/share/unity3d/Unity
          printf '%s' "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
          chmod 600 /root/.local/share/unity3d/Unity/Unity_lic.ulf

      - name: Run content validation batch
        run: >
          /opt/unity/Editor/Unity
          -batchmode
          -nographics
          -projectPath .
          -quit
          -logFile Logs/content-validation-ci.log
          -executeMethod SM.Editor.Validation.ValidationBatchEntryPoint.RunContentValidation

      - name: Run balance sweep smoke batch
        run: >
          /opt/unity/Editor/Unity
          -batchmode
          -nographics
          -projectPath .
          -quit
          -logFile Logs/balance-sweep-ci.log
          -executeMethod SM.Editor.Validation.ValidationBatchEntryPoint.RunBalanceSweepSmoke

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-validation-artifacts
          path: |
            Logs/content-validation/**
            Logs/balance-sweep/**
            Logs/content-validation-ci.log
            Logs/balance-sweep-ci.log

  editmode-validation-tests:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Unity license file
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${UNITY_LICENSE:-}" ]]; then
            echo "::error::UNITY_LICENSE secret is required for Unity EditMode validation."
            exit 1
          fi
          mkdir -p /root/.local/share/unity3d/Unity
          printf '%s' "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
          chmod 600 /root/.local/share/unity3d/Unity/Unity_lic.ulf

      - name: Run EditMode validation and compile tests (Unity 6000.4.0f1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/editmode-validation
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -projectPath . \
            -runTests \
            -testPlatform EditMode \
            -testResults test-results/editmode-validation/results.xml \
            -logFile test-results/editmode-validation/unity.log

      - name: Upload EditMode validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-validation-results
          path: test-results/editmode-validation

schema: p09_visual_identity_manifest_v1
updated_at: 2026-05-13
source:
  p09_preset_dir: Assets/Resources/_Game/Battle/Appearances/P09
  capture_dir: Logs/p09-fullbody
  capture_anchor_dir: art-pipeline/ref/characters
coverage_note: This manifest covers characters that already have Unity P09 presets/captures. It is not the dialogue portrait target source; use
  character_asset_manifest.yaml for the Pindoc wiki target list.
alias_presets:
- alias_id: priest
  target_id: hero_dawn_priest
  hidden_in_authoring: true
  reason: Runtime ArchetypeId fallback. Studio must show the named hero only.
- alias_id: raider
  target_id: hero_pack_raider
  hidden_in_authoring: true
  reason: Runtime ArchetypeId fallback. Studio must show the named hero only.
- alias_id: hexer
  target_id: hero_grave_hexer
  hidden_in_authoring: true
  reason: Runtime ArchetypeId fallback. Studio must show the named hero only.
rules:
- id: hide_runtime_aliases_in_studio
  severity: error
  summary: Archetype alias presets stay available for runtime fallback but are hidden from P09 Appearance Studio.
- id: same_faction_same_job
  severity: review
  summary: Same faction and same job may share an outfit family, but hair, palette, weapon, or silhouette must separate the character.
- id: cross_faction_overlap
  severity: warning
  summary: Different faction or job should not rely on the exact same outfit unless palette and head/hair make them readable.
- id: no_exact_character_duplicate
  severity: error
  summary: No two non-alias characters should share the same body, outfit, weapon, shield, and palette signature.

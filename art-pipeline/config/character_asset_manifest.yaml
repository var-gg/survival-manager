schema: character_asset_manifest_v1
updated_at: 2026-05-14

source:
  primary_registry: pindoc://wiki-character-lore-registry-mirror
  dialogue_policy: pindoc://analysis-character-operation-layer
  asset_matrix: pindoc://analysis-character-asset-matrix-dawn-priest
  rule: "All Pindoc wiki characters with dialogue lines are story portrait targets. Support/background/NPC tiers are not minimal battle-only exceptions."

profiles:
  story_dialogue_character:
    description: "Any Pindoc wiki character with dialogue lines. Full narrative emotion, combat face, VN bust, and stance coverage."
    required:
      - anchor
      - portrait_full_default
      - face_emotion_sheet
      - face_combat_state_sheet
      - bust_emotion_sheet_R
      - bust_emotion_sheet_L_outputs
      - battle_stance_sheet
  lead_story_combat:
    description: "Legacy alias for story_dialogue_character. Lead 4 keep the same full set."
    required:
      - anchor
      - portrait_full_default
      - face_emotion_sheet
      - face_combat_state_sheet
      - bust_emotion_sheet_R
      - bust_emotion_sheet_L_outputs
      - battle_stance_sheet
  named_story_battle:
    description: "Legacy alias for story_dialogue_character. Named battle/story characters keep the same full set."
    required:
      - anchor
      - portrait_full_default
      - face_emotion_sheet
      - face_combat_state_sheet
      - bust_emotion_sheet_R
      - bust_emotion_sheet_L_outputs
      - battle_stance_sheet
  battle_actor_core:
    description: "Deprecated profile name. Kept for compatibility, but it now requires the full dialogue character matrix."
    deprecated: true
    required:
      - anchor
      - portrait_full_default
      - face_emotion_sheet
      - face_combat_state_sheet
      - bust_emotion_sheet_R
      - bust_emotion_sheet_L_outputs
      - battle_stance_sheet

asset_requirements:
  anchor:
    kind: ref
    files:
      - ref/characters/{id}/anchor.png
  portrait_full_default:
    kind: subject_output
    subject: subjects/characters/{id}/portrait_full_default.md
    outputs:
      - output/{id}/portrait_full.png
  face_emotion_sheet:
    kind: sheet_output
    subject: subjects/characters/{id}/face_emotion_sheet.md
    outputs:
      - output/{id}/face_emotion_sheet.png
    derived_outputs:
      - output/{id}/portrait_face_default.png
      - output/{id}/portrait_face_smile.png
      - output/{id}/portrait_face_serious.png
      - output/{id}/portrait_face_shock.png
      - output/{id}/portrait_face_anger.png
      - output/{id}/portrait_face_sad.png
      - output/{id}/portrait_face_cry.png
      - output/{id}/portrait_face_quiet.png
  face_combat_state_sheet:
    kind: sheet_output
    subject: subjects/characters/{id}/face_combat_state_sheet.md
    outputs:
      - output/{id}/face_combat_state_sheet.png
    derived_outputs:
      - output/{id}/portrait_face_wounded.png
      - output/{id}/portrait_face_stunned.png
      - output/{id}/portrait_face_feared.png
      - output/{id}/portrait_face_charmed.png
      - output/{id}/portrait_face_pained.png
      - output/{id}/portrait_face_downed.png
  bust_emotion_sheet_R:
    kind: sheet_output
    subject: subjects/characters/{id}/bust_emotion_sheet_R.md
    outputs:
      - output/{id}/bust_emotion_sheet_R.png
    derived_outputs:
      - output/{id}/portrait_bust_default_R.png
      - output/{id}/portrait_bust_smile_R.png
      - output/{id}/portrait_bust_serious_R.png
      - output/{id}/portrait_bust_shock_R.png
      - output/{id}/portrait_bust_anger_R.png
      - output/{id}/portrait_bust_sad_R.png
      - output/{id}/portrait_bust_cry_R.png
      - output/{id}/portrait_bust_quiet_R.png
  bust_emotion_sheet_L_outputs:
    kind: derived_output
    derivation: mirror_from_bust_emotion_sheet_R
    derived_outputs:
      - output/{id}/portrait_bust_default_L.png
      - output/{id}/portrait_bust_smile_L.png
      - output/{id}/portrait_bust_serious_L.png
      - output/{id}/portrait_bust_shock_L.png
      - output/{id}/portrait_bust_anger_L.png
      - output/{id}/portrait_bust_sad_L.png
      - output/{id}/portrait_bust_cry_L.png
      - output/{id}/portrait_bust_quiet_L.png
  battle_stance_sheet:
    kind: sheet_output
    subject: subjects/characters/{id}/battle_stance_sheet.md
    outputs:
      - output/{id}/battle_stance_sheet.png
    derived_outputs:
      - output/{id}/portrait_stance_idle.png
      - output/{id}/portrait_stance_attack.png
      - output/{id}/portrait_stance_guard.png
      - output/{id}/portrait_stance_cast.png

